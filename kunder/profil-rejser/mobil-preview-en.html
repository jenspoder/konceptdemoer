<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil Rejser — Mobile preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: #f0eeea;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 300;
      font-size: 28px;
      color: #1A2C41;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      font-size: 14px;
      color: #545454;
      margin-bottom: 32px;
      text-align: center;
    }

    /* PHONE FRAME */
    .phone-frame {
      width: 390px;
      height: 844px;
      border-radius: 48px;
      background: #111;
      padding: 14px;
      box-shadow:
        0 24px 80px rgba(0,0,0,0.2),
        0 4px 16px rgba(0,0,0,0.1),
        inset 0 0 0 2px #333;
      position: relative;
    }

    .phone-frame::before {
      content: '';
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 28px;
      background: #111;
      border-radius: 0 0 16px 16px;
      z-index: 10;
    }

    .phone-frame::after {
      content: '';
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 16px;
      background: #000;
      border-radius: 10px;
      z-index: 11;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 36px;
      overflow: hidden;
      background: #fff;
    }

    .phone-screen iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .demo-label {
      margin-top: 16px;
      font-size: 13px;
      color: #545454;
      text-align: center;
    }

    .demo-label strong {
      color: #1A2C41;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 24px;
      font-size: 13px;
      color: #1A2C41;
      text-decoration: none;
      border-bottom: 1px solid rgba(26,44,65,0.3);
      padding-bottom: 2px;
    }

    .back-link:hover {
      border-color: #1A2C41;
    }
  </style>
</head>
<body>

  <a href="demo-ai-english/index.html" class="back-link">← Back to overview</a>
  <a href="demo-ai-english/index.html" style="text-decoration:none"><h1>Profil Rejser — AI Search</h1></a>
  <p class="subtitle">Mobile demo in iPhone frame</p>

  <div class="phone-frame">
    <div class="phone-screen">
      <iframe id="demoFrame" src="demo-ai-english/ai-search-mobile.html"></iframe>
    </div>
  </div>

  <div class="demo-label" id="demoLabel"><strong>AI Search</strong> — Homepage with AI search</div>

</body>
</html>
